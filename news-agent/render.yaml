services:
  - type: web
    name: news-intelligence
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python dashboard.py
    plan: free
    envVars:
      - key: DB_PATH
        value: /data/news.db
      - key: GEMINI_API_KEY
        sync: false
      - key: MIN_PRIORITY_SCORE
        value: "40"
