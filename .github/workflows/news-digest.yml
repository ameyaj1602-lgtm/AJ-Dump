name: Daily News Digest

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: news-agent

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser httpx python-dotenv

      - name: Create .env file
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "EMAIL_ENABLED=true" > .env
          echo "EMAIL_FROM=${EMAIL_FROM}" >> .env
          echo "EMAIL_PASSWORD=${EMAIL_PASSWORD}" >> .env
          echo "EMAIL_TO=${EMAIL_TO}" >> .env
          echo "GEMINI_API_KEY=${GEMINI_API_KEY}" >> .env
          echo "MIN_PRIORITY_SCORE=40" >> .env

      - name: Fetch news
        run: python main.py --once
        timeout-minutes: 5

      - name: Send email digest
        run: python main.py --email
        timeout-minutes: 2
