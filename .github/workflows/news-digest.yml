name: News Intelligence Agent

on:
  schedule:
    # 3 digests/day — fetch fresh news + send email each time
    # 3:00 UTC  = 8:30 AM IST  (Morning)
    # 8:00 UTC  = 1:30 PM IST  (Afternoon)
    # 14:00 UTC = 7:30 PM IST  (Evening)
    - cron: '0 3 * * *'
    - cron: '0 8 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch: # Manual trigger button on GitHub

jobs:
  news-cycle:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: news-agent

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: news-agent/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env file
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "EMAIL_ENABLED=true" > .env
          echo "EMAIL_FROM=${EMAIL_FROM}" >> .env
          echo "EMAIL_PASSWORD=${EMAIL_PASSWORD}" >> .env
          echo "EMAIL_TO=${EMAIL_TO}" >> .env
          echo "GEMINI_API_KEY=${GEMINI_API_KEY}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}" >> .env
          echo "TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}" >> .env
          echo "MIN_PRIORITY_SCORE=40" >> .env

      # Restore DB from previous run
      - name: Restore news database
        uses: actions/cache@v4
        with:
          path: news-agent/news.db
          key: news-db-${{ github.run_number }}
          restore-keys: |
            news-db-

      # Fetch, score, store
      - name: Fetch and analyse news
        run: python main.py --once
        timeout-minutes: 10

      # Always send email — every run is a digest
      - name: Send email digest
        run: python main.py --email
        timeout-minutes: 3

      # Save DB for next run
      - name: Save news database
        uses: actions/cache/save@v4
        if: always()
        with:
          path: news-agent/news.db
          key: news-db-${{ github.run_number }}

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: news-db-${{ github.run_id }}
          path: news-agent/news.db
          retention-days: 7
